<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ballade</title>
  </head>
  <body>
    <div id="map"></div>
    <aside id="panel">
      <h1>Ballade</h1>
      <section>
        <h2>1. Route</h2>
        <p class="hint">Click the map: start, then destination — or search an address.</p>
        <input id="search-start" placeholder="Start address (press Enter)" />
        <input id="search-end" placeholder="Destination address (press Enter)" />
        <select id="profile">
          <option value="foot">Walking</option>
          <option value="bike">Cycling</option>
          <option value="car">Driving</option>
        </select>
        <button id="reset-route">Reset route</button>
      </section>
      <section>
        <h2>2. Music</h2>
        <input type="file" id="audio-file" accept="audio/*" />
        <input id="artist" placeholder="Artist" />
        <input id="title" placeholder="Title" />
        <button id="fetch-lyrics">Find lyrics (lrclib)</button>
        <label class="hint">or a .lrc / .vtt / .srt file:
          <input type="file" id="lyrics-file" accept=".lrc,.vtt,.srt" />
        </label>
      </section>
      <section>
        <h2>3. Play</h2>
        <button id="play" disabled>▶ Start the journey</button>
        <label class="hint">Volume <input type="range" id="volume" min="0" max="1" step="0.05" value="1" /></label>
        <p id="status" class="hint">Click the map: start, then destination.</p>
      </section>
    </aside>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
